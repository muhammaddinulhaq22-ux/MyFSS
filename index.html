<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFFA AHMAD CUP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9991A;
    --gold-dark: #A67C12;
    --dark: #0A0A0A;
    --white: #FFFFFF;
    --gray-light: #F4F4F4;
    --gray: #888888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  /* ===== NAVBAR (SEKARANG PUTIH) ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--white);
    box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    height: 80px;
    display: flex;
    align-items: center;
    padding: 0 40px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
  }

  .nav-logo img {
    height: 60px;
    width: auto;
  }

  .nav-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .nav-logo-text span:first-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--dark);
    letter-spacing: 1px;
  }

  .nav-logo-text span:last-child {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: var(--gold-dark);
    font-weight: 700;
    letter-spacing: 2px;
  }

  .nav-links {
    margin-left: auto;
    display: flex;
    gap: 30px;
    list-style: none;
  }

  .nav-links a {
    color: var(--dark);
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.3s;
  }

  .nav-links a:hover {
    color: var(--gold-dark);
  }

  /* ===== HERO SECTION ===== */
  .hero {
    margin-top: 80px;
    position: relative;
    height: 90vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.image2url.com/r2/default/images/1776789169537-2807c285-5fb3-4f58-88bf-b93aaafe84f0.png') no-repeat center center;
    background-size: cover;
    z-index: 1;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
    z-index: 2;
  }

  .hero-content {
    position: relative;
    z-index: 3;
    text-align: center;
    max-width: 900px;
    padding: 0 20px;
  }

  .hero-content h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(50px, 8vw, 100px);
    color: var(--white);
    letter-spacing: 4px;
    line-height: 0.9;
    margin-bottom: 20px;
    text-shadow: 0 5px 15px rgba(0,0,0,0.5);
  }

  .hero-content p {
    font-size: clamp(18px, 2vw, 24px);
    color: var(--gray-light);
    font-weight: 400;
    line-height: 1.6;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

  .gold-line {
    width: 100px;
    height: 4px;
    background: var(--gold);
    margin: 20px auto;
  }

  /* ===== FOOTER ===== */
  footer {
    padding: 60px 20px;
    background: var(--dark);
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .footer-logo img {
    height: 80px;
    margin-bottom: 20px;
  }

  .footer-copy {
    font-size: 13px;
    color: var(--gray);
    margin-top: 20px;
  }

  /* ===================================================
     RESPONSIVE: LANDSCAPE (LAPTOP/DESKTOP)
     Layar lebar >= 1024px
  =================================================== */
  @media (min-width: 1024px) {
    nav {
      height: 80px;
      padding: 0 60px;
    }

    .nav-logo img {
      height: 60px;
    }

    .nav-logo-text span:first-child {
      font-size: 26px;
    }

    .nav-logo-text span:last-child {
      font-size: 14px;
    }

    .nav-links {
      display: flex;
      gap: 35px;
    }

    .nav-links a {
      font-size: 16px;
    }

    .hero {
      margin-top: 80px;
      height: 90vh;
    }

    .hero-content {
      max-width: 900px;
    }

    .hero-content h1 {
      font-size: clamp(70px, 8vw, 110px);
      letter-spacing: 6px;
    }

    .hero-content p {
      font-size: clamp(18px, 1.8vw, 26px);
    }

    .gold-line {
      width: 120px;
      height: 4px;
      margin: 22px auto;
    }

    footer {
      padding: 70px 20px;
    }

    .footer-logo img {
      height: 90px;
    }
  }

  /* ===================================================
     RESPONSIVE: TABLET LANDSCAPE
     Layar 768px - 1023px
  =================================================== */
  @media (min-width: 768px) and (max-width: 1023px) {
    nav {
      padding: 0 30px;
      height: 70px;
    }

    .nav-logo img {
      height: 50px;
    }

    .nav-logo-text span:first-child {
      font-size: 20px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      font-size: 14px;
    }

    .hero {
      margin-top: 70px;
      height: 88vh;
    }

    .hero-content h1 {
      font-size: clamp(50px, 7vw, 80px);
    }

    .hero-content p {
      font-size: clamp(16px, 2.2vw, 22px);
    }
  }

  /* ===================================================
     RESPONSIVE: PORTRAIT HANDPHONE
     Layar <= 767px (portrait / mobile)
  =================================================== */
  @media (max-width: 767px) {
    /* --- Navbar --- */
    nav {
      padding: 0 16px;
      height: 64px;
    }

    .nav-logo img {
      height: 44px;
    }

    .nav-logo-text span:first-child {
      font-size: 17px;
      letter-spacing: 0.5px;
    }

    .nav-logo-text span:last-child {
      font-size: 11px;
      letter-spacing: 1.5px;
    }

    /* Sembunyikan nav links di mobile */
    .nav-links {
      display: none;
    }

    /* --- Hero --- */
    .hero {
      margin-top: 64px;
      height: calc(100dvh - 64px); /* Full layar minus navbar */
      align-items: center;
    }

    .hero-bg {
      background-position: center top;
    }

    .hero-content {
      max-width: 100%;
      padding: 0 24px;
    }

    .hero-content h1 {
      font-size: clamp(42px, 13vw, 68px);
      letter-spacing: 3px;
      margin-bottom: 14px;
    }

    .hero-content p {
      font-size: clamp(15px, 4vw, 19px);
      line-height: 1.55;
    }

    .gold-line {
      width: 72px;
      height: 3px;
      margin: 16px auto;
    }

    /* --- Footer --- */
    footer {
      padding: 40px 16px;
    }

    .footer-logo img {
      height: 64px;
      margin-bottom: 14px;
    }

    .footer-copy {
      font-size: 12px;
    }
  }

  /* ===================================================
     RESPONSIVE: HANDPHONE SANGAT KECIL (< 380px)
  =================================================== */
  @media (max-width: 380px) {
    nav {
      padding: 0 12px;
      height: 58px;
    }

    .nav-logo img {
      height: 38px;
    }

    .nav-logo-text span:first-child {
      font-size: 15px;
    }

    .nav-logo-text span:last-child {
      font-size: 10px;
    }

    .hero {
      margin-top: 58px;
      height: calc(100dvh - 58px);
    }

    .hero-content h1 {
      font-size: clamp(36px, 12vw, 52px);
      letter-spacing: 2px;
    }

    .hero-content p {
      font-size: 14px;
    }

    .gold-line {
      width: 60px;
      height: 3px;
    }
  }

  /* ===================================================
     RESPONSIVE: LANDSCAPE HANDPHONE (horizontal)
     Tinggi layar kecil tapi lebar (hape diputar)
  =================================================== */
  @media (max-width: 767px) and (orientation: landscape) {
    nav {
      height: 54px;
    }

    .nav-logo img {
      height: 38px;
    }

    .hero {
      margin-top: 54px;
      height: calc(100dvh - 54px);
    }

    .hero-content h1 {
      font-size: clamp(32px, 7vw, 56px);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .hero-content p {
      font-size: clamp(13px, 2.5vw, 17px);
    }

    .gold-line {
      width: 60px;
      height: 3px;
      margin: 12px auto;
    }

    footer {
      padding: 30px 16px;
    }

    .footer-logo img {
      height: 52px;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <img src="https://www.image2url.com/r2/default/images/1776788907334-d84e95d6-8390-450b-b669-0efb3a45720f.png" alt="IFFA Logo">
    <div class="nav-logo-text">
      <span>IFFA AHMAD CUP 2026</span>
      <span>OFFICIAL PORTAL</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="#">Beranda</a></li>
    <li><a href="#">Tentang</a></li>
    <li><a href="#">Negara Fiksi</a></li>
    <li><a href="#">Kontak</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>IFFA AHMAD CUP 2026</h1>
    <div class="gold-line"></div>
    <p>
      Dibuat untuk menyatukan keberagaman Negara Fiksi melalui Sepak Bola, 
      Menyatukan semua untuk sportifitas tinggi.
    </p>
  </div>
</section>

<footer>
  <div class="footer-logo">
    <img src="https://www.image2url.com/r2/default/images/1776788907334-d84e95d6-8390-450b-b669-0efb3a45720f.png" alt="IFFA Logo">
  </div>
  <p style="color: var(--gold-dark); font-weight: 600; letter-spacing: 1px;">#UnitingFictionalNations</p>
  <div class="footer-copy">
    &copy; 2026 IFFA AHMAD CUP. Semua hak cipta dilindungi.
  </div>
</footer>

</body>
</html>
